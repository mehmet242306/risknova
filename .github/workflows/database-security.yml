name: Database Security

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  security-db:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare runner tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            exit 0
          fi
          test -n "$SUPABASE_PROJECT_REF" || { echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          python3 --version
          psql --version

      - name: Build database URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            DB_URL="$(python3 -c 'import os; from urllib.parse import urlsplit, urlunsplit; raw=os.environ[\"SUPABASE_DB_URL\"]; project_ref=os.environ[\"SUPABASE_PROJECT_REF\"]; parts=urlsplit(raw); hostname=parts.hostname or \"\"; username=parts.username or \"\"; password=parts.password or \"\"; port=f\":{parts.port}\" if parts.port else \"\"; username = f\"postgres.{project_ref}\" if hostname.endswith(\".pooler.supabase.com\") and username == \"postgres\" else username; netloc=username; netloc += f\":{password}\" if password else \"\"; netloc += f\"@{hostname}{port}\" if hostname else \"\"; print(urlunsplit((parts.scheme, netloc, parts.path, parts.query, parts.fragment)))')"
          else
            POOLER_HOST="${SUPABASE_POOLER_HOST:-aws-1-eu-west-1.pooler.supabase.com}"
            DB_PASSWORD_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')"
            DB_URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${DB_PASSWORD_ENCODED}@${POOLER_HOST}:5432/postgres?sslmode=require"
          fi
          echo "::add-mask::$DB_URL"
          echo "WORKFLOW_DB_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Verify database connection
        shell: bash
        run: |
          set -euxo pipefail
          if ! psql "$WORKFLOW_DB_URL" -v ON_ERROR_STOP=1 -c "select current_database(), current_user;" 2> /tmp/psql_connect.err; then
            echo "::error title=Database connection failed::$(head -n 1 /tmp/psql_connect.err | tr -d '\r')"
            cat /tmp/psql_connect.err
            exit 1
          fi

      - name: Validate migration history
        shell: bash
        run: |
          set -euo pipefail
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort > /tmp/local_migrations.txt
          psql "$WORKFLOW_DB_URL" -v ON_ERROR_STOP=1 -At -c "select version || '_' || name || '.sql' from supabase_migrations.schema_migrations order by version;" > /tmp/remote_migrations.txt
          missing_count="$(comm -23 /tmp/local_migrations.txt /tmp/remote_migrations.txt | tee /tmp/pending_migrations.txt | wc -l | tr -d ' ')"
          if [ "$missing_count" != "0" ]; then
            echo "::error title=Migration validation failed::Remote database is missing committed migrations"
            echo "Pending migrations:"
            cat /tmp/pending_migrations.txt
            exit 1
          fi

      - name: Run RLS pgTAP suite
        shell: bash
        run: |
          set -euxo pipefail
          psql "$WORKFLOW_DB_URL" -v ON_ERROR_STOP=1 -c "select * from public.rls_tests();" || {
              echo "::error title=RLS test suite failed::public.rls_tests() returned an error"
              exit 1
            }
