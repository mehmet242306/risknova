name: Database Security

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  security-db:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install CLI tools
        run: |
          npm install --global supabase
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_PROJECT_REF" || { echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "::error::Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Show CLI versions
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          supabase --version
          psql --version

      - name: Validate migration plan
        shell: bash
        run: |
          set -euxo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"
          supabase --debug db push --linked --dry-run --include-all

      - name: Verify database connection
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.$SUPABASE_PROJECT_REF.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select current_database(), current_user;"

      - name: Run RLS pgTAP suite
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select * from public.rls_tests();"
