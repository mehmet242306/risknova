name: Database Security

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  security-db:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare runner tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v node >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y nodejs npm
          fi
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_PROJECT_REF" || { echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Show CLI versions
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          npx --yes supabase@latest --version
          psql --version

      - name: Validate migration plan
        shell: bash
        run: |
          set -euxo pipefail
          DB_PASSWORD_ENCODED="$(node -p 'encodeURIComponent(process.env.SUPABASE_DB_PASSWORD)')"
          DB_URL="postgresql://postgres:${DB_PASSWORD_ENCODED}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          npx --yes supabase@latest --debug db push --linked=false --db-url "$DB_URL" --dry-run --include-all || {
            echo "::error title=Migration validation failed::supabase db push --dry-run failed"
            exit 1
          }

      - name: Verify database connection
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.$SUPABASE_PROJECT_REF.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select current_database(), current_user;" || {
              echo "::error title=Database connection failed::psql could not connect to Supabase"
              exit 1
            }

      - name: Run RLS pgTAP suite
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select * from public.rls_tests();" || {
              echo "::error title=RLS test suite failed::public.rls_tests() returned an error"
              exit 1
            }
