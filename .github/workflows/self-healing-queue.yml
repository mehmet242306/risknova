name: Self-Healing Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  process-queue:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SELF_HEALING_CRON_SECRET: ${{ secrets.SELF_HEALING_CRON_SECRET }}
    steps:
      - name: Process queued tasks
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APP_BASE_URL:-}" ] || [ -z "${SELF_HEALING_CRON_SECRET:-}" ]; then
            echo "::notice title=Self-healing queue skipped::APP_BASE_URL veya SELF_HEALING_CRON_SECRET tanimli degil."
            exit 0
          fi
          curl -fsS -X POST "${APP_BASE_URL%/}/api/self-healing/queue/process" \
            -H "Content-Type: application/json" \
            -H "x-self-healing-key: ${SELF_HEALING_CRON_SECRET}" \
            --data '{"batchSize":10}'
