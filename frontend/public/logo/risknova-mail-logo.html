<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RiskNova Mail Logo</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #16233b;
        overflow: hidden;
      }

      .canvas {
        width: 420px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 20px 24px;
        box-sizing: border-box;
        background: #16233b;
      }

      img {
        display: block;
        width: 270px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <img src="./risknova-primary-light.svg" alt="RiskNova" />
    </div>
  </body>
</html>
